name: Bug Report
description: Report a problem with NuSpec.AI
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: "When I run `dotnet pack`, the ai/package-map.json is missing..."
    validations:
      required: true

  - type: input
    id: nuspec-version
    attributes:
      label: NuSpec.AI version
      description: The version of the NuSpec.AI package you are using
      placeholder: "1.0.1"
    validations:
      required: true

  - type: input
    id: dotnet-version
    attributes:
      label: .NET SDK version
      description: Output of `dotnet --version`
      placeholder: "8.0.300"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: dropdown
    id: project-type
    attributes:
      label: Project type
      options:
        - Class Library
        - Web API
        - Console App
        - Other
    validations:
      required: true

  - type: textarea
    id: repro-steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue
      placeholder: |
        1. Create a class library with...
        2. Add NuSpec.AI package reference...
        3. Run `dotnet pack`...
    validations:
      required: true

  - type: textarea
    id: package-map-output
    attributes:
      label: Package map output
      description: Contents of `ai/package-map.json` if it was generated (optional)
      render: json
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Any other information that might be helpful
    validations:
      required: false
