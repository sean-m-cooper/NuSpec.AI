name: Publish to NuGet

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore NuSpec.AI.slnx

      - name: Build & Test
        run: dotnet test tests/NuSpec.AI.Tool.Tests/NuSpec.AI.Tool.Tests.csproj -c Release

      - name: Publish CLI tool
        run: >
          dotnet publish src/NuSpec.AI.Tool/NuSpec.AI.Tool.csproj
          -c Release
          -o src/NuSpec.AI/tools/net8.0
          --no-self-contained

      - name: Pack NuSpec.AI
        run: >
          dotnet pack src/NuSpec.AI/NuSpec.AI.csproj
          -c Release
          -o artifacts
          --no-build
          -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Push to NuGet
        run: >
          dotnet nuget push artifacts/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: artifacts/*.nupkg
