name: Publish to NuGet

on:
  push:
    branches: [main]

jobs:
  publish:
    name: Pack & Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore NuSpec.AI.slnx

      - name: Build & Test
        run: |
          dotnet build NuSpec.AI.slnx -c Release --no-restore
          dotnet test tests/NuSpec.AI.Tool.Tests/NuSpec.AI.Tool.Tests.csproj -c Release --no-build

      - name: Publish tool binary (shared)
        run: dotnet publish src/NuSpec.AI.Tool/NuSpec.AI.Tool.csproj -c Release -o src/NuSpec.AI/tools/net8.0 --no-self-contained

      - name: Copy tool binary to NuSpec.AI.Pro
        run: cp -r src/NuSpec.AI/tools/net8.0/. src/NuSpec.AI.Pro/tools/net8.0/

      - name: Pack NuSpec.AI
        run: dotnet pack src/NuSpec.AI/NuSpec.AI.csproj -c Release -o artifacts --no-build

      - name: Pack NuSpec.AI.Pro
        run: dotnet pack src/NuSpec.AI.Pro/NuSpec.AI.Pro.csproj -c Release -o artifacts --no-build

      - name: Pack NuSpec.AI.Attributes
        run: dotnet pack src/NuSpec.AI.Attributes/NuSpec.AI.Attributes.csproj -c Release -o artifacts

      - name: Push to NuGet.org
        run: dotnet nuget push artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
